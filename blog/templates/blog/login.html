{% extends 'blog/base.html' %}

{% block content %}
<div class="row mt-5">
    <div class="col-md-4 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title h4 text-center mb-4">Вход в дневник</h2>
                <form method="post" action=".">

                    {% csrf_token %}

                    <!-- Django сам автоматически сгенерирует и подставит сюда поля логина и пароля -->
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary w-100 mt-3">Войти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
