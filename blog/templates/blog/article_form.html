{% extends 'blog/base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <h2 class="mb-4 h3">Написать новую запись в дневник</h2>
        <div class="card p-4 shadow-sm">
            <form method="post" action=".">
                {% csrf_token %}


                {% bootstrap_form form %}

                <div class="mt-3">
                    <button type="submit" class="btn btn-success">Опубликовать</button>
                    <a href="{% url 'blog:index' %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
